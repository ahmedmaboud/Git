name: Two Job Workflow

on:
  push:
    branches:
      - main

jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        run: echo "First job running"

  second-job:
    runs-on: ubuntu-latest
    needs: first-job
    steps:
      - name: Step 2
        run: echo "Second job running because first succeeded"
